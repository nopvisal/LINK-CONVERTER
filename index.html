<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaForge Pro - Video Converter & 4K Image Upscaler</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #14141f;
            --surface2: #1a1a2e;
            --surface3: #1e1e32;
            --accent: #6c5ce7;
            --accent2: #a855f7;
            --accent3: #6366f1;
            --text: #e2e2f0;
            --text2: #b0b0c8;
            --text3: #8888a8;
            --border: #2a2a40;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --yt: #ff0033;
            --fb: #1877f2;
            --tt: #ff0050;
            --gradient1: linear-gradient(135deg, #6c5ce7, #a855f7);
            --gradient2: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gradient3: linear-gradient(135deg, #1a1a2e, #14141f);
            --shadow-lg: 0 25px 60px rgba(0, 0, 0, 0.5);
            --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.4);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 20%, rgba(108, 92, 231, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 70% 60%, rgba(168, 85, 247, 0.05) 0%, transparent 55%),
                radial-gradient(ellipse at 40% 80%, rgba(99, 102, 241, 0.04) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 10%, rgba(255, 0, 80, 0.03) 0%, transparent 55%);
            z-index: 0;
            pointer-events: none;
            animation: bgShift 20s ease-in-out infinite;
        }
        @keyframes bgShift {
            0%,
            100% {
                transform: translate(0, 0);
            }
            25% {
                transform: translate(1%, -1%);
            }
            50% {
                transform: translate(-0.5%, 1.5%);
            }
            75% {
                transform: translate(1.5%, 0.5%);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 20px 40px;
        }

        .header {
            text-align: center;
            padding: 30px 20px 20px;
        }
        .header .logo {
            font-size: 2.4rem;
            font-weight: 800;
            background: var(--gradient1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            margin-bottom: 4px;
        }
        .header .tagline {
            font-size: 0.95rem;
            color: var(--text3);
            letter-spacing: 0.5px;
        }

        .platform-selector {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0 24px;
        }
        .platform-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 24px;
            border-radius: 50px;
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text2);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: var(--transition);
            white-space: nowrap;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }
        .platform-btn:hover {
            border-color: var(--accent);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.25);
        }
        .platform-btn.active {
            border-color: transparent;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.35);
        }
        .platform-btn.active.yt-active {
            background: var(--yt);
            border-color: var(--yt);
        }
        .platform-btn.active.fb-active {
            background: var(--fb);
            border-color: var(--fb);
        }
        .platform-btn.active.tt-active {
            background: var(--tt);
            border-color: var(--tt);
        }
        .platform-btn .icon {
            font-size: 1.4rem;
        }
        .platform-btn .badge {
            font-size: 0.7rem;
            background: rgba(255, 255, 255, 0.2);
            padding: 3px 8px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .main-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 30px 28px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            margin-bottom: 28px;
            transition: var(--transition);
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text);
        }
        .section-title .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(108, 92, 231, 0.6);
            }
            50% {
                box-shadow: 0 0 0 12px rgba(108, 92, 231, 0);
            }
        }

        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .input-group input {
            flex: 1;
            min-width: 250px;
            padding: 14px 18px;
            border-radius: 50px;
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 0.95rem;
            transition: var(--transition);
            outline: none;
            letter-spacing: 0.3px;
        }
        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.1);
        }
        .input-group input::placeholder {
            color: var(--text3);
        }
        .btn {
            padding: 14px 28px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            transition: var(--transition);
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: var(--gradient1);
            color: #fff;
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.45);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-download {
            background: var(--success);
            color: #000;
            font-weight: 700;
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.3);
        }
        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.45);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            border-color: var(--accent);
            color: #fff;
        }
        .btn-sm {
            padding: 10px 18px;
            font-size: 0.85rem;
            border-radius: 40px;
        }

        .format-selector {
            display: flex;
            gap: 10px;
            margin: 16px 0;
            flex-wrap: wrap;
        }
        .format-option {
            padding: 10px 18px;
            border-radius: 40px;
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text2);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            letter-spacing: 0.3px;
        }
        .format-option:hover {
            border-color: var(--accent);
            color: #fff;
        }
        .format-option.selected {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.35);
        }
        .quality-tag {
            font-size: 0.7rem;
            opacity: 0.8;
            margin-left: 4px;
        }

        .result-area {
            margin-top: 20px;
            display: none;
            animation: fadeInUp 0.4s ease;
        }
        .result-area.show {
            display: block;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .preview-card {
            background: var(--surface2);
            border-radius: var(--radius-md);
            padding: 20px;
            border: 1px solid var(--border);
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .preview-thumb {
            width: 160px;
            height: 90px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background: var(--surface3);
            flex-shrink: 0;
        }
        .preview-info {
            flex: 1;
            min-width: 180px;
        }
        .preview-info h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #fff;
            word-break: break-word;
        }
        .preview-info .meta {
            font-size: 0.8rem;
            color: var(--text3);
        }
        .download-btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .progress-bar-wrap {
            height: 6px;
            background: var(--surface3);
            border-radius: 20px;
            margin: 16px 0;
            overflow: hidden;
            display: none;
        }
        .progress-bar-wrap.active {
            display: block;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--gradient1);
            border-radius: 20px;
            width: 0%;
            transition: width 0.5s ease;
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            padding: 14px 20px;
            border-radius: 50px;
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
            animation: slideInRight 0.3s ease, fadeOutRight 0.3s ease 3.5s forwards;
            box-shadow: var(--shadow-md);
            max-width: 400px;
        }
        .toast.success {
            background: #16a34a;
        }
        .toast.error {
            background: var(--danger);
        }
        .toast.info {
            background: var(--accent3);
        }
        @keyframes slideInRight {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes fadeOutRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(120%);
                opacity: 0;
            }
        }

        .upscaler-section {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 30px 28px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }
        .drop-zone {
            border: 3px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 50px 30px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--surface2);
            position: relative;
        }
        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--accent);
            background: rgba(108, 92, 231, 0.05);
            box-shadow: 0 0 40px rgba(108, 92, 231, 0.1);
        }
        .drop-zone .drop-icon {
            font-size: 4rem;
            margin-bottom: 12px;
        }
        .drop-zone p {
            color: var(--text2);
            font-weight: 500;
        }
        .drop-zone .sub {
            font-size: 0.8rem;
            color: var(--text3);
            margin-top: 4px;
        }
        .drop-zone input {
            display: none;
        }
        .image-preview-area {
            display: none;
            margin-top: 20px;
            animation: fadeInUp 0.4s ease;
        }
        .image-preview-area.show {
            display: block;
        }
        .image-compare {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .image-box {
            flex: 1;
            min-width: 250px;
            max-width: 420px;
            background: var(--surface2);
            border-radius: var(--radius-md);
            padding: 14px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .image-box img {
            max-width: 100%;
            border-radius: var(--radius-sm);
            max-height: 350px;
            object-fit: contain;
        }
        .image-box .label {
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: var(--text2);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .image-box .resolution {
            font-size: 0.75rem;
            color: var(--text3);
            margin-top: 6px;
        }
        .upscale-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 640px) {
            .header .logo {
                font-size: 1.7rem;
            }
            .platform-btn {
                padding: 11px 16px;
                font-size: 0.85rem;
                gap: 6px;
            }
            .main-card,
            .upscaler-section {
                padding: 20px 16px;
                border-radius: var(--radius-md);
            }
            .input-group input {
                min-width: 100%;
                font-size: 0.9rem;
                padding: 12px 16px;
            }
            .btn {
                padding: 12px 20px;
                font-size: 0.85rem;
            }
            .preview-thumb {
                width: 100%;
                height: 180px;
            }
            .preview-card {
                flex-direction: column;
                align-items: stretch;
            }
            .image-compare {
                flex-direction: column;
                align-items: center;
            }
            .image-box {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="logo">⚡ MediaForge Pro</div>
            <div class="tagline">Video Converter &bull; 4K Image Upscaler</div>
        </div>

        <div class="platform-selector">
            <button class="platform-btn active yt-active" data-platform="youtube" id="btnYt">
                <span class="icon">▶️</span> YouTube
                <span class="badge">MP4/MP3</span>
            </button>
            <button class="platform-btn" data-platform="facebook" id="btnFb">
                <span class="icon">📘</span> Facebook
                <span class="badge">MP4</span>
            </button>
            <button class="platform-btn" data-platform="tiktok" id="btnTt">
                <span class="icon">🎵</span> TikTok
                <span class="badge">MP4</span>
            </button>
        </div>

        <div class="main-card" id="converterCard">
            <div class="section-title">
                <span class="dot"></span>
                <span id="converterTitle">YouTube Video Converter</span>
            </div>

            <div class="input-group">
                <input type="text" id="videoUrl" placeholder="Paste your YouTube video link here...">
                <button class="btn btn-primary" id="btnFetch" onclick="fetchVideoInfo()">
                    🔍 Fetch Info
                </button>
            </div>

            <div class="format-selector" id="formatSelector">
                <button class="format-option selected" data-format="mp4" onclick="selectFormat('mp4')">
                    🎬 MP4 <span class="quality-tag">Video</span>
                </button>
                <button class="format-option" data-format="mp3" onclick="selectFormat('mp3')">
                    🎵 MP3 <span class="quality-tag">Audio</span>
                </button>
                <button class="format-option" data-format="mp4_hd" onclick="selectFormat('mp4_hd')">
                    🎬 MP4 HD <span class="quality-tag">1080p</span>
                </button>
            </div>

            <div class="progress-bar-wrap" id="progressBar">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>

            <div class="result-area" id="resultArea">
                <div class="preview-card">
                    <img class="preview-thumb" id="previewThumb" src="" alt="Preview">
                    <div class="preview-info">
                        <h3 id="previewTitle">Video Title</h3>
                        <p class="meta" id="previewMeta">Duration: -- | Quality: --</p>
                        <div class="download-btns">
                            <button class="btn btn-download" id="btnDownload" onclick="downloadMedia()">
                                ⬇️ Download
                            </button>
                            <button class="btn btn-outline btn-sm" onclick="clearResult()">
                                ✕ Clear
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="upscaler-section" id="upscalerSection">
            <div class="section-title">
                <span class="dot"></span>
                🖼️ Image Upscaler to 4K
            </div>
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('imageInput').click()">
                <div class="drop-icon">📤</div>
                <p><strong>Click to upload</strong> or drag & drop an image</p>
                <p class="sub">Supports JPG, PNG, WebP — Upscales to 4K resolution</p>
                <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)">
            </div>
            <div class="image-preview-area" id="imagePreviewArea">
                <div class="image-compare">
                    <div class="image-box">
                        <div class="label">📷 Original</div>
                        <img id="originalImage" src="" alt="Original">
                        <div class="resolution" id="originalRes"></div>
                    </div>
                    <div class="image-box">
                        <div class="label">✨ Upscaled (4K)</div>
                        <img id="upscaledImage" src="" alt="Upscaled">
                        <div class="resolution" id="upscaledRes"></div>
                    </div>
                </div>
                <div class="upscale-actions">
                    <button class="btn btn-primary" id="btnUpscale" onclick="upscaleImage()">
                        🚀 Upscale to 4K
                    </button>
                    <button class="btn btn-download" id="btnDownloadUpscaled" onclick="downloadUpscaled()" style="display:none;">
                        ⬇️ Download 4K Image
                    </button>
                    <button class="btn btn-outline btn-sm" onclick="clearImage()">
                        ✕ Clear
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
    // ==================== STATE ====================
    const state = {
        platform: 'youtube',
        format: 'mp4',
        videoInfo: null,
        downloadUrl: null,          // Direct CDN URL from API
        originalImageData: null,
        upscaledImageData: null,
        isProcessing: false,
    };

    // ==================== DOM REFS ====================
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    const dom = {
        btnYt: $('#btnYt'),
        btnFb: $('#btnFb'),
        btnTt: $('#btnTt'),
        converterTitle: $('#converterTitle'),
        videoUrl: $('#videoUrl'),
        btnFetch: $('#btnFetch'),
        formatSelector: $('#formatSelector'),
        resultArea: $('#resultArea'),
        previewThumb: $('#previewThumb'),
        previewTitle: $('#previewTitle'),
        previewMeta: $('#previewMeta'),
        btnDownload: $('#btnDownload'),
        progressBar: $('#progressBar'),
        progressFill: $('#progressFill'),
        dropZone: $('#dropZone'),
        imageInput: $('#imageInput'),
        imagePreviewArea: $('#imagePreviewArea'),
        originalImage: $('#originalImage'),
        upscaledImage: $('#upscaledImage'),
        originalRes: $('#originalRes'),
        upscaledRes: $('#upscaledRes'),
        btnUpscale: $('#btnUpscale'),
        btnDownloadUpscaled: $('#btnDownloadUpscaled'),
        toastContainer: $('#toastContainer'),
    };

    // ==================== TOASTS ====================
    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        dom.toastContainer.appendChild(toast);
        setTimeout(() => toast.remove(), 3800);
    }

    // ==================== PLATFORM SWITCHING ====================
    function switchPlatform(platform) {
        state.platform = platform;
        state.videoInfo = null;
        state.downloadUrl = null;
        state.format = platform === 'youtube' ? 'mp4' : 'mp4';
        clearResult(false);

        [dom.btnYt, dom.btnFb, dom.btnTt].forEach(b => {
            b.classList.remove('active', 'yt-active', 'fb-active', 'tt-active');
        });

        const placeholders = {
            youtube: 'Paste your YouTube video link here...',
            facebook: 'Paste your Facebook video link here...',
            tiktok: 'Paste your TikTok video link here...',
        };
        const titles = {
            youtube: 'YouTube Video Converter',
            facebook: 'Facebook Video Converter',
            tiktok: 'TikTok Video Converter',
        };

        dom.videoUrl.placeholder = placeholders[platform];
        dom.converterTitle.textContent = titles[platform];

        if (platform === 'youtube') {
            dom.btnYt.classList.add('active', 'yt-active');
            dom.formatSelector.style.display = 'flex';
            $$('.format-option').forEach(f => f.classList.remove('selected'));
            const mp4Btn = $('.format-option[data-format="mp4"]');
            if (mp4Btn) mp4Btn.classList.add('selected');
            state.format = 'mp4';
        } else if (platform === 'facebook') {
            dom.btnFb.classList.add('active', 'fb-active');
            dom.formatSelector.style.display = 'none';
            state.format = 'mp4';
        } else if (platform === 'tiktok') {
            dom.btnTt.classList.add('active', 'tt-active');
            dom.formatSelector.style.display = 'none';
            state.format = 'mp4';
        }

        dom.resultArea.classList.remove('show');
        dom.videoUrl.value = '';
        dom.videoUrl.focus();
    }

    dom.btnYt.addEventListener('click', () => switchPlatform('youtube'));
    dom.btnFb.addEventListener('click', () => switchPlatform('facebook'));
    dom.btnTt.addEventListener('click', () => switchPlatform('tiktok'));

    function selectFormat(format) {
        state.format = format;
        $$('.format-option').forEach(f => f.classList.remove('selected'));
        const el = $(`.format-option[data-format="${format}"]`);
        if (el) el.classList.add('selected');

        // If we already fetched info, update the download URL silently
        if (state.videoInfo && state.platform === 'youtube') {
            // Re‑fetch with new format? Cobalt would give a different URL.
            // Simpler: just re‑trigger fetch (or mark that format changed)
            fetchVideoInfo(); // re‑fetch with new format
        }
    }

    // ==================== PROGRESS ====================
    function setProgress(percent) {
        dom.progressBar.classList.add('active');
        dom.progressFill.style.width = percent + '%';
        if (percent >= 100) {
            setTimeout(() => {
                dom.progressBar.classList.remove('active');
                dom.progressFill.style.width = '0%';
            }, 700);
        }
    }

    // ==================== URL EXTRACTION ====================
    function extractVideoId(url) {
        const ytPatterns = [
            /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/)([a-zA-Z0-9_-]{11})/,
            /youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/,
        ];
        for (const pat of ytPatterns) {
            const match = url.match(pat);
            if (match) return { platform: 'youtube', id: match[1] };
        }

        const fbPatterns = [
            /facebook\.com\/(?:watch\/?\?v=|reel\/|share\/r\/|share\/v\/|videos\/)([a-zA-Z0-9_.-]+)/,
            /fb\.watch\/([a-zA-Z0-9_-]+)/,
            /facebook\.com\/[a-zA-Z0-9.]+\/videos\/([a-zA-Z0-9_.-]+)/,
        ];
        for (const pat of fbPatterns) {
            const match = url.match(pat);
            if (match) return { platform: 'facebook', id: match[1] };
        }

        const ttPatterns = [
            /tiktok\.com\/@[\w.-]+\/video\/(\d+)/,
            /tiktok\.com\/v\/(\d+)/,
            /vm\.tiktok\.com\/([\w]+)/,
        ];
        for (const pat of ttPatterns) {
            const match = url.match(pat);
            if (match) return { platform: 'tiktok', id: match[1] };
        }

        return null;
    }

    // ==================== FETCH VIDEO INFO (using Cobalt + TikTok fallback) ====================
    async function fetchVideoInfo() {
        const url = dom.videoUrl.value.trim();
        if (!url) {
            showToast('Please paste a video link first.', 'error');
            return;
        }

        const extracted = extractVideoId(url);
        if (!extracted) {
            showToast('Unrecognized URL. Please check the link.', 'error');
            return;
        }

        if (extracted.platform !== state.platform) {
            const platformNames = { youtube: 'YouTube', facebook: 'Facebook', tiktok: 'TikTok' };
            showToast(`This looks like a ${platformNames[extracted.platform]} link. Switching...`, 'info');
            switchPlatform(extracted.platform);
            dom.videoUrl.value = url;
            await new Promise(r => setTimeout(r, 300));
        }

        state.videoInfo = null;
        state.downloadUrl = null;
        dom.resultArea.classList.remove('show');
        dom.btnFetch.disabled = true;
        dom.btnFetch.innerHTML = '<span class="spinner"></span> Fetching...';
        setProgress(20);

        try {
            if (state.platform === 'tiktok') {
                // Use original TikTok API first (fast), fallback to Cobalt
                await fetchTikTokInfo(url);
            } else {
                // YouTube and Facebook → Cobalt API
                await fetchWithCobalt(url);
            }
            setProgress(100);
        } catch (err) {
            console.error('Fetch error:', err);
            showToast('Failed: ' + err.message, 'error');
            setProgress(0);
        } finally {
            dom.btnFetch.disabled = false;
            dom.btnFetch.innerHTML = '🔍 Fetch Info';
        }
    }

    /**
     * Main function to fetch direct download URL using Cobalt.tools API.
     * Works for YouTube, Facebook, TikTok, etc.
     */
    async function fetchWithCobalt(url) {
        setProgress(30);

        // Build request body according to Cobalt API docs:
        // https://github.com/imputnet/cobalt/blob/current/docs/api.md
        const body = {
            url: url,
            filenamePattern: "basic",   // Clean filename
        };

        // YouTube specific format options
        if (state.platform === 'youtube') {
            if (state.format === 'mp3') {
                body.isAudioOnly = true;
                body.youtubeAudioCodec = 'opus'; // best quality audio
            } else {
                body.isAudioOnly = false;
                body.youtubeVideoCodec = 'h264'; // widely compatible
                // Map our format selection to Cobalt quality
                if (state.format === 'mp4_hd') {
                    body.videoQuality = '1080';
                } else {
                    body.videoQuality = '720'; // default MP4
                }
            }
        }

        // Facebook: Cobalt handles it automatically, no extra params needed.
        // TikTok: same, but we keep the dedicated TikTok path for speed.

        const response = await fetch('https://api.cobalt.tools/api/json', {
            method: 'POST',
            headers: {
                'Accept': 'application/json',
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(body),
        });

        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`Cobalt API error (${response.status}): ${errText}`);
        }

        const data = await response.json();
        setProgress(60);

        // Cobalt responses can be:
        // - success: { status: "tunnel" | "redirect", url: "https://..." }
        // - error: { status: "error", error: { code: "..." } }
        if (data.status === 'error') {
            throw new Error(data.error?.code || 'Unknown Cobalt error');
        }

        if (!data.url) {
            throw new Error('No download URL returned by Cobalt.');
        }

        const directUrl = data.url;
        // Extract a decent title from the original URL (we'll refine later)
        let title = state.platform === 'youtube' ? 'YouTube Video' : state.platform === 'facebook' ? 'Facebook Video' : 'Video';
        let thumbnail = '';

        // For better title/thumbnail, we can still use oEmbed where possible
        if (state.platform === 'youtube') {
            const extracted = extractVideoId(url);
            if (extracted && extracted.id) {
                thumbnail = `https://img.youtube.com/vi/${extracted.id}/hqdefault.jpg`;
                try {
                    const oembedUrl = `https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`;
                    const oResp = await fetch(oembedUrl);
                    if (oResp.ok) {
                        const oData = await oResp.json();
                        title = oData.title || title;
                        thumbnail = oData.thumbnail_url || thumbnail;
                    }
                } catch (e) { /* ignore */ }
            }
        } else if (state.platform === 'facebook') {
            thumbnail = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="90" fill="%231a1a2e"><rect width="160" height="90"/><text x="80" y="50" text-anchor="middle" fill="%23888" font-size="12">FB Video</text></svg>';
            // We could try to get a thumbnail from the page, but skip for simplicity.
        }

        state.videoInfo = {
            title: title,
            thumbnail: thumbnail,
            url: url,
            duration: 'Unknown',
        };
        state.downloadUrl = directUrl;
        setProgress(80);

        // Update UI
        dom.previewThumb.src = thumbnail;
        dom.previewTitle.textContent = title;
        const formatLabel = state.format === 'mp3' ? 'MP3 Audio' : state.format === 'mp4_hd' ? 'MP4 HD' : 'MP4';
        dom.previewMeta.textContent = `Format: ${formatLabel} | Platform: ${state.platform}`;
        dom.resultArea.classList.add('show');
        dom.btnDownload.textContent = state.format === 'mp3' ? '⬇️ Download MP3' : '⬇️ Download MP4';
        dom.btnDownload.onclick = downloadMedia; // ensure handler

        showToast('Ready! Click Download to save the file.', 'success');
        setProgress(100);
    }

    // ---- TikTok: keep the working original API for speed, fallback to Cobalt ----
    async function fetchTikTokInfo(url) {
        setProgress(30);
        // Primary: tikwm.com
        let videoData = null;
        try {
            const resp = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
            if (resp.ok) {
                const data = await resp.json();
                if (data.code === 0 && data.data) {
                    videoData = data.data;
                }
            }
        } catch (e) { /* ignore */ }

        // If tikwm fails, use Cobalt
        if (!videoData) {
            console.log('TikWM failed, trying Cobalt for TikTok...');
            return await fetchWithCobalt(url);
        }

        setProgress(60);
        const info = {
            title: videoData.title || 'TikTok Video',
            thumbnail: videoData.cover || '',
            url: url,
            duration: videoData.duration || 'Unknown',
            author: videoData.author?.nickname || '',
        };

        const directUrl = videoData.hdplay || videoData.play || videoData.wmplay || '';
        if (!directUrl) throw new Error('No download link found.');

        state.videoInfo = info;
        state.downloadUrl = directUrl;
        setProgress(80);

        dom.previewThumb.src = info.thumbnail;
        dom.previewTitle.textContent = info.title;
        dom.previewMeta.textContent = `Author: @${info.author} | Duration: ${info.duration}s | TikTok`;
        dom.resultArea.classList.add('show');
        dom.btnDownload.textContent = '⬇️ Download MP4';
        dom.btnDownload.onclick = downloadMedia;
        showToast('TikTok video found! Ready to download.', 'success');
        setProgress(100);
    }

    // ==================== DOWNLOAD (blob‑based, like TikTok) ====================
    async function downloadMedia() {
        const url = state.downloadUrl;
        if (!url) {
            showToast('No download link. Please fetch the video first.', 'error');
            return;
        }

        dom.btnDownload.disabled = true;
        dom.btnDownload.innerHTML = '<span class="spinner"></span> Downloading...';

        try {
            // Always try direct blob download first
            await downloadViaBlob(url);
        } catch (err) {
            console.warn('Blob download failed, opening direct URL as fallback:', err.message);
            // Fallback: open the direct URL in a new tab
            window.open(url, '_blank', 'noopener,noreferrer');
            showToast('Opening download in a new tab...', 'info');
        } finally {
            dom.btnDownload.disabled = false;
            const formatLabel = state.format === 'mp3' ? 'MP3' : 'MP4';
            dom.btnDownload.innerHTML = `⬇️ Download ${formatLabel}`;
        }
    }

    async function downloadViaBlob(directUrl) {
        showToast('Preparing download...', 'info');
        // Use fetch with no-cors? Cobalt URLs should be CORS-friendly.
        const response = await fetch(directUrl);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        const ext = state.format === 'mp3' ? 'mp3' : 'mp4';
        const baseName = (state.videoInfo?.title || 'download')
            .replace(/[^a-zA-Z0-9\s]/g, '')
            .substring(0, 60)
            .trim() || 'video';
        a.download = `${baseName}.${ext}`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
        showToast('Download complete! ✅', 'success');
    }

    function clearResult(clearInput = true) {
        state.videoInfo = null;
        state.downloadUrl = null;
        dom.resultArea.classList.remove('show');
        dom.previewThumb.src = '';
        dom.previewTitle.textContent = 'Video Title';
        dom.previewMeta.textContent = 'Duration: -- | Quality: --';
        dom.btnDownload.textContent = '⬇️ Download';
        dom.btnDownload.onclick = downloadMedia;
        dom.btnDownload.disabled = false;
        if (clearInput) dom.videoUrl.value = '';
        dom.progressBar.classList.remove('active');
        dom.progressFill.style.width = '0%';
    }

    dom.videoUrl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') fetchVideoInfo();
    });

    // ==================== IMAGE UPSCALER (unchanged) ====================
    dom.dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dom.dropZone.classList.add('dragover');
    });
    dom.dropZone.addEventListener('dragleave', () => {
        dom.dropZone.classList.remove('dragover');
    });
    dom.dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dom.dropZone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
            processUploadedImage(file);
        } else {
            showToast('Please drop an image file (JPG, PNG, WebP).', 'error');
        }
    });

    function handleImageUpload(event) {
        const file = event.target.files[0];
        if (file && file.type.startsWith('image/')) {
            processUploadedImage(file);
        }
    }

    function processUploadedImage(file) {
        if (file.size > 50 * 1024 * 1024) {
            showToast('Image too large. Max 50MB allowed.', 'error');
            return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                state.originalImageData = {
                    src: e.target.result,
                    width: img.width,
                    height: img.height,
                    file: file,
                };
                state.upscaledImageData = null;
                dom.originalImage.src = e.target.result;
                dom.originalRes.textContent = `Resolution: ${img.width} × ${img.height} px (${(file.size / 1024).toFixed(1)} KB)`;
                dom.upscaledImage.src = '';
                dom.upscaledRes.textContent = 'Not yet upscaled';
                dom.imagePreviewArea.classList.add('show');
                dom.btnUpscale.style.display = 'inline-flex';
                dom.btnDownloadUpscaled.style.display = 'none';
                dom.dropZone.style.display = 'none';
                showToast('Image loaded! Click "Upscale to 4K" to enhance.', 'info');
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function upscaleImage() {
        if (!state.originalImageData) {
            showToast('Please upload an image first.', 'error');
            return;
        }
        if (state.isProcessing) return;
        state.isProcessing = true;
        dom.btnUpscale.disabled = true;
        dom.btnUpscale.innerHTML = '<span class="spinner"></span> Upscaling...';
        setTimeout(() => {
            try {
                const img = new Image();
                img.onload = function() {
                    const TARGET_LONG_SIDE = 3840;
                    const origW = img.width, origH = img.height;
                    const aspectRatio = origW / origH;
                    let targetW, targetH;
                    if (aspectRatio >= 1) {
                        targetW = TARGET_LONG_SIDE;
                        targetH = Math.round(TARGET_LONG_SIDE / aspectRatio);
                    } else {
                        targetH = TARGET_LONG_SIDE;
                        targetW = Math.round(TARGET_LONG_SIDE * aspectRatio);
                    }
                    if (targetW < 800) targetW = 800;
                    if (targetH < 600) targetH = 600;
                    const upscaledDataUrl = stepwiseUpscale(img, targetW, targetH);
                    state.upscaledImageData = { src: upscaledDataUrl, width: targetW, height: targetH };
                    dom.upscaledImage.src = upscaledDataUrl;
                    dom.upscaledRes.textContent = `Resolution: ${targetW} × ${targetH} px (4K Quality)`;
                    dom.btnDownloadUpscaled.style.display = 'inline-flex';
                    dom.btnUpscale.style.display = 'none';
                    showToast(`Image upscaled to ${targetW}×${targetH} (4K)! 🎉`, 'success');
                    state.isProcessing = false;
                    dom.btnUpscale.disabled = false;
                    dom.btnUpscale.innerHTML = '🚀 Upscale to 4K';
                };
                img.onerror = () => {
                    showToast('Error processing image.', 'error');
                    state.isProcessing = false;
                    dom.btnUpscale.disabled = false;
                    dom.btnUpscale.innerHTML = '🚀 Upscale to 4K';
                };
                img.src = state.originalImageData.src;
            } catch (err) {
                showToast('Upscaling failed: ' + err.message, 'error');
                state.isProcessing = false;
                dom.btnUpscale.disabled = false;
                dom.btnUpscale.innerHTML = '🚀 Upscale to 4K';
            }
        }, 100);
    }

    function stepwiseUpscale(img, targetW, targetH) {
        const MAX_STEP = 1.8;
        let currentW = img.width, currentH = img.height;
        const scaleX = targetW / currentW, scaleY = targetH / currentH;
        const maxScale = Math.max(scaleX, scaleY);
        const steps = Math.max(1, Math.ceil(Math.log(maxScale) / Math.log(MAX_STEP)));
        const scalePerStep = Math.pow(maxScale, 1 / steps);
        let sourceCanvas = document.createElement('canvas');
        sourceCanvas.width = currentW; sourceCanvas.height = currentH;
        let sourceCtx = sourceCanvas.getContext('2d');
        sourceCtx.imageSmoothingEnabled = true;
        sourceCtx.imageSmoothingQuality = 'high';
        sourceCtx.drawImage(img, 0, 0, currentW, currentH);
        for (let i = 0; i < steps; i++) {
            let nextW, nextH;
            if (i === steps - 1) { nextW = targetW; nextH = targetH; }
            else { nextW = Math.round(currentW * scalePerStep); nextH = Math.round(currentH * scalePerStep); }
            const nextCanvas = document.createElement('canvas');
            nextCanvas.width = nextW; nextCanvas.height = nextH;
            const nextCtx = nextCanvas.getContext('2d');
            nextCtx.imageSmoothingEnabled = true;
            nextCtx.imageSmoothingQuality = 'high';
            nextCtx.drawImage(sourceCanvas, 0, 0, currentW, currentH, 0, 0, nextW, nextH);
            sourceCanvas = nextCanvas;
            currentW = nextW; currentH = nextH;
        }
        const sharpened = applySharpening(sourceCanvas);
        return sharpened.toDataURL('image/jpeg', 0.92);
    }

    function applySharpening(canvas) {
        const ctx = canvas.getContext('2d');
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data, w = canvas.width, h = canvas.height;
        const output = new Uint8ClampedArray(data);
        const kernel = [0, -0.4, 0, -0.4, 2.6, -0.4, 0, -0.4, 0];
        for (let y = 1; y < h - 1; y++) {
            for (let x = 1; x < w - 1; x++) {
                const idx = (y * w + x) * 4;
                for (let c = 0; c < 3; c++) {
                    let sum = 0;
                    for (let ky = -1; ky <= 1; ky++) {
                        for (let kx = -1; kx <= 1; kx++) {
                            const pixelIdx = ((y + ky) * w + (x + kx)) * 4 + c;
                            sum += data[pixelIdx] * kernel[(ky + 1) * 3 + (kx + 1)];
                        }
                    }
                    output[idx + c] = Math.max(0, Math.min(255, sum));
                }
                output[idx + 3] = data[idx + 3];
            }
        }
        const resultCanvas = document.createElement('canvas');
        resultCanvas.width = w; resultCanvas.height = h;
        resultCanvas.getContext('2d').putImageData(new ImageData(output, w, h), 0, 0);
        return resultCanvas;
    }

    function downloadUpscaled() {
        if (!state.upscaledImageData) {
            showToast('Please upscale the image first.', 'error');
            return;
        }
        const a = document.createElement('a');
        a.href = state.upscaledImageData.src;
        a.download = `upscaled_4k_${state.upscaledImageData.width}x${state.upscaledImageData.height}.jpg`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        showToast('4K image downloaded! 📸', 'success');
    }

    function clearImage() {
        state.originalImageData = null;
        state.upscaledImageData = null;
        dom.originalImage.src = '';
        dom.upscaledImage.src = '';
        dom.originalRes.textContent = '';
        dom.upscaledRes.textContent = '';
        dom.imagePreviewArea.classList.remove('show');
        dom.dropZone.style.display = '';
        dom.btnUpscale.style.display = 'inline-flex';
        dom.btnDownloadUpscaled.style.display = 'none';
        dom.imageInput.value = '';
        state.isProcessing = false;
        dom.btnUpscale.disabled = false;
        dom.btnUpscale.innerHTML = '🚀 Upscale to 4K';
    }

    // ==================== INIT ====================
    switchPlatform('youtube');
    dom.videoUrl.focus();

    console.log('🚀 MediaForge Pro ready (Cobalt API)');
    console.log('  ✅ YouTube / Facebook / TikTok → direct download');
    console.log('  ✅ Image Upscaler to 4K');
</script>
